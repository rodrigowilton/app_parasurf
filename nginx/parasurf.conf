# =============================================
# Nginx — Instituto ParaSurf
# Proxy: porta pública 80/443 → app 3015
# =============================================

server {
    listen 80;
    server_name parasurf.seudominio.com.br;   # <- troque pelo seu domínio ou IP

    # Redireciona para HTTPS (descomente quando tiver SSL)
    # return 301 https://$host$request_uri;

    # Proxy reverso para o app Vite/Serve na porta 3015
    location / {
        proxy_pass         http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SPA: rota todas as requests para o index.html
        try_files $uri $uri/ @proxy;
    }

    location @proxy {
        proxy_pass http://127.0.0.1:3015;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3015;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/parasurf-access.log;
    error_log  /var/log/nginx/parasurf-error.log;
}

